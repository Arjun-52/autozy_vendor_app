name: autozy_vendor_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.2.0

  # State Management
  provider: ^6.1.2
  dotted_border: ^3.1.0
  image_picker: ^1.2.1
  another_flushbar: ^1.12.32
  flutter_svg: ^2.0.10
  
  # Firebase
  firebase_messaging: ^15.1.6
  firebase_core: ^3.8.6
  
  # Permissions
  permission_handler: ^11.3.6
  
  # HTTP Client & API
  dio: ^4.0.6
  retrofit: ^3.0.1+1
  json_annotation: ^4.8.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # App Launcher Icons
  flutter_launcher_icons: ^0.13.1
  
  # Code Generation
  retrofit_generator: ^4.0.3+1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

  # Splash Screen
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon.png
    - assets/images/logo.svg  

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700


flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo.png
  android: true
  ios: true